<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>afganswa - Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');
        body { 
            background: #0d0705; color: #f5f5dc; font-family: 'Space Grotesk', sans-serif;
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 0; overflow: hidden; opacity: 0; animation: fadeIn 0.8s forwards;
        }

        /* Container kamera agar stabil */
        .camera-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }

        .main-frame {
            position: relative; width: 320px; height: 426px;
            padding: 10px; background: #1a0f0a; border-radius: 4px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        .viewport { width: 100%; height: 100%; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Shutter Section - Dikunci di bawah */
        .shutter-section { height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        
        .shutter-btn {
            width: 80px; height: 80px; border: 4px solid #d2b48c; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s;
        }
        .inner-btn { width: 60px; height: 60px; background: white; border-radius: 50%; }
        .shutter-btn:active { transform: scale(0.9); }

        #flash { position: fixed; inset: 0; background: white; opacity: 0; z-index: 1000; pointer-events: none; }
        .flash-active { animation: flashFX 0.5s ease-out; }
        @keyframes flashFX { 0% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes fadeIn { to { opacity: 1; } }

        .exit-up { animation: exitUp 1s cubic-bezier(0.77, 0, 0.175, 1) forwards; }
        @keyframes exitUp { to { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body id="b">
    <div id="flash"></div>

    <div class="text-[10px] tracking-[6px] opacity-40 uppercase">afganswa manual studio</div>

    <div class="camera-section">
        <div class="main-frame">
            <div class="viewport">
                <div id="countdown" class="absolute inset-0 flex items-center justify-center text-8xl font-bold text-white z-50"></div>
                <video id="v" autoplay playsinline></video>
            </div>
            <div class="absolute top-4 left-4 bg-[#d2b48c] text-black px-2 py-1 text-[9px] font-bold" id="label">SHOT 1/3</div>
        </div>
    </div>

    <div class="shutter-section">
        <div class="shutter-btn" id="shutter" onclick="takePhoto()">
            <div class="inner-btn"></div>
        </div>
        <p class="mt-4 text-[9px] tracking-[2px] opacity-30 uppercase">Hold steady for capture</p>
    </div>

    <script>
        const v = document.getElementById('v');
        let pics = []; let current = 1;
        navigator.mediaDevices.getUserMedia({video: {aspectRatio: 3/4}}).then(s => v.srcObject = s);

        function takePhoto() {
            if(current > 3) return;
            document.getElementById('shutter').style.pointerEvents = 'none';
            let count = 3;
            const timer = setInterval(() => {
                document.getElementById('countdown').innerText = count;
                count--;
                if(count < 0) {
                    clearInterval(timer);
                    document.getElementById('countdown').innerText = "";
                    capture();
                }
            }, 700);
        }

        function capture() {
            const f = document.getElementById('flash');
            f.classList.add('flash-active');
            setTimeout(() => f.classList.remove('flash-active'), 500);

            const can = document.createElement('canvas');
            can.width = v.videoWidth; can.height = v.videoHeight;
            const ctx = can.getContext('2d');
            ctx.translate(can.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(v, 0, 0);
            pics.push(can.toDataURL('image/jpeg', 0.8));

            current++;
            if(current <= 3) {
                document.getElementById('label').innerText = `SHOT ${current}/3`;
                document.getElementById('shutter').style.pointerEvents = 'auto';
            } else {
                localStorage.setItem('data_afganswa', JSON.stringify(pics));
                document.getElementById('b').classList.add('exit-up');
                setTimeout(() => window.location.href = 'result.html', 1000);
            }
        }
    </script>
</body>
</html>
