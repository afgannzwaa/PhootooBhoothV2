<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>afganswa - Digital Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Instrument+Serif:ital@1&display=swap');
        
        :root { --gold: #d2b48c; --dark: #120a07; }

        body { 
            background: var(--dark); color: var(--gold); 
            font-family: 'Space Grotesk', sans-serif; 
            height: 100vh; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }

        /* --- DEKORASI LATAR BELAKANG --- */
        .bg-grid {
            position: fixed; inset: 0;
            background-image: linear-gradient(to right, #1a0f0a 1px, transparent 1px),
                              linear-gradient(to bottom, #1a0f0a 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1; opacity: 0.5;
        }

        /* --- ANIMASI TEKS BERSUSUN (STAGGERED) --- */
        .reveal-container { position: relative; z-index: 10; text-align: center; width: 100%; }
        
        .line-parent { overflow: hidden; height: auto; margin-bottom: -10px; }
        
        .text-reveal {
            font-family: 'Instrument Serif', serif;
            font-size: clamp(5rem, 15vw, 10rem);
            line-height: 0.9; transform: translateY(100%);
            animation: moveUp 1.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        .deco-bar {
            width: 0%; height: 2px; background: var(--gold);
            margin: 2rem auto;
            animation: lineExpand 1.2s cubic-bezier(0.85, 0, 0.15, 1) forwards;
            animation-delay: 0.3s;
        }

        @keyframes moveUp { to { transform: translateY(0); } }
        @keyframes lineExpand { to { width: 250px; } }

        /* --- TOMBOL LUXE --- */
        .btn-container { opacity: 0; animation: fadeIn 1s ease forwards; animation-delay: 1.5s; }
        
        .btn-luxe {
            border: 1px solid var(--gold); padding: 1.5rem 4rem;
            text-transform: uppercase; letter-spacing: 8px; font-weight: 700;
            position: relative; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent; cursor: pointer;
        }

        .btn-luxe:hover { 
            background: var(--gold); color: var(--dark); 
            box-shadow: 0 0 50px rgba(210, 180, 140, 0.2);
            letter-spacing: 12px;
        }

        /* --- EXIT ANIMATION --- */
        .page-exit {
            animation: collapseOut 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }

        @keyframes collapseOut {
            0% { transform: translateY(0) scale(1); filter: blur(0); }
            100% { transform: translateY(100vh) scale(0.8); filter: blur(10px); }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="bg-grid"></div>

    <div class="reveal-container" id="content">
        <div class="line-parent">
            <h1 class="text-reveal" style="animation-delay: 0.5s;">Phooto</h1>
        </div>
        <div class="deco-bar"></div>
        <div class="line-parent">
            <h1 class="text-reveal" style="animation-delay: 0.8s;">Booth</h1>
        </div>

        <div class="btn-container mt-12">
            <button class="btn-luxe" onclick="startSession()">Start</button>
            <p class="mt-8 text-[10px] tracking-[5px] opacity-40">© AFGANSWA STUDIO 2026</p>
        </div>
    </div>

    <script>
        function startSession() {
            document.getElementById('content').classList.add('page-exit');
            setTimeout(() => { window.location.href = 'camera.html'; }, 1100);
        }
    </script>
</body>
</html>
